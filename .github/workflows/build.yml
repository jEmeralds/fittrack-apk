name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/fittrack.keystore \
            -alias fittrack \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass fittrack123 -keypass fittrack123 \
            -dname "CN=FitTrack,O=FitTrack,C=KE"

      - name: Create signing config
        run: |
          cat >> gradle.properties << 'EOF'
          STORE_FILE=fittrack.keystore
          STORE_PASSWORD=fittrack123
          KEY_ALIAS=fittrack
          KEY_PASSWORD=fittrack123
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: fittrack-apk
          path: app/build/outputs/apk/release/*.apk
