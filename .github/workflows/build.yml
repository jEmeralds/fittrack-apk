name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/fittrack.keystore \
            -alias fittrack \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass fittrack123 -keypass fittrack123 \
            -dname "CN=FitTrack,O=FitTrack,C=KE"

      - name: Install Gradle 8.1.1
        run: |
          curl -s https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.1.1/bin
          echo "/opt/gradle/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Generate wrapper
        run: |
          gradle wrapper --gradle-version=8.1.1 --distribution-type=bin
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Xmx512m -Dorg.gradle.daemon=false

      - uses: actions/upload-artifact@v4
        with:
          name: FitTrack-APK
          path: app/build/outputs/apk/release/*.apk
