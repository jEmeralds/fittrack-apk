name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/fittrack.keystore \
            -alias fittrack \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass fittrack123 -keypass fittrack123 \
            -dname "CN=FitTrack,O=FitTrack,C=KE"
      - name: Download gradlew
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -O gradle.zip
          unzip -q gradle.zip
          cp gradle-8.1.1/bin/gradle gradlew
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew :app:assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: FitTrack-APK
          path: app/build/outputs/apk/release/*.apk